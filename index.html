<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offensive Web & Cloud Security Roadmap</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0b0e14;--sf:#111620;--s2:#161d2a;--bd:#1e2738;--tx:#c5cdd8;--mu:#6b7a8d;--br:#e8edf3;--ac:#e05252;--ad:rgba(224,82,82,.12);--gn:#3fb950;--gd:rgba(63,185,80,.12);--yl:#d29922;--yd:rgba(210,153,34,.12);--bl:#58a6ff;--bd2:rgba(88,166,255,.1);--m:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;--s:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;--r:6px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--s);background:var(--bg);color:var(--tx);line-height:1.5;min-height:100vh}::selection{background:var(--ac);color:#fff}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.app{display:flex;min-height:100vh}.side{width:220px;background:var(--sf);border-right:1px solid var(--bd);padding:20px 0;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:10}.mn{margin-left:220px;flex:1;padding:28px 40px;max-width:920px}
.logo{padding:0 16px 20px;border-bottom:1px solid var(--bd);margin-bottom:8px}.logo h1{font-size:13px;font-weight:600;color:var(--br);letter-spacing:.5px;text-transform:uppercase}.logo p{font-size:10px;color:var(--mu);margin-top:3px;font-family:var(--m)}
.ns{padding:8px 12px;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu);font-weight:600;margin-top:10px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 16px;font-size:12px;color:var(--mu);cursor:pointer;transition:all .12s;border-left:2px solid transparent}.ni:hover{color:var(--tx);background:var(--s2)}.ni.a{color:var(--br);background:var(--s2);border-left-color:var(--ac)}.ni .c{margin-left:auto;font-family:var(--m);font-size:10px}.ni.a .c{color:var(--ac)}
.sft{margin-top:auto;padding:14px 16px;border-top:1px solid var(--bd)}.sft .l{font-size:10px;color:var(--mu);margin-bottom:6px}
.pb{height:3px;background:var(--s2);border-radius:2px;overflow:hidden}.pf{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.pt{font-size:20px;font-weight:600;color:var(--br);margin-bottom:3px}.pd{font-size:12px;color:var(--mu);margin-bottom:28px;line-height:1.6}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:28px}.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px}.sc .l{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}.sc .v{font-size:24px;font-weight:700;font-family:var(--m);color:var(--br)}.sc .su{font-size:10px;color:var(--mu);margin-top:3px}
.ph{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.phh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .1s}.phh:hover{background:var(--s2)}
.phh .t{font-size:13px;font-weight:600;color:var(--br);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phh .mt{display:flex;align-items:center;gap:12px;flex-shrink:0}.phh .pt2{font-family:var(--m);font-size:11px;color:var(--mu)}
.phh .ar{color:var(--mu);font-size:11px;transition:transform .15s}.ph.o .ar{transform:rotate(90deg)}
.phb{display:none;border-top:1px solid var(--bd)}.ph.o .phb{display:block}
.phd{padding:10px 16px;font-size:11px;color:var(--mu);border-bottom:1px solid var(--bd);line-height:1.6}
.cr{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--bd);transition:background .08s}.cr:last-child{border-bottom:none}.cr:hover{background:rgba(255,255,255,.015)}.cr.d{opacity:.45}.cr.d .cn{text-decoration:line-through}
.ck{width:15px;height:15px;border:1.5px solid var(--bd);border-radius:3px;margin-right:12px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}.ck:hover{border-color:var(--ac)}.ck.on{background:var(--ac);border-color:var(--ac)}.ck.on::after{content:'✓';font-size:10px;color:#fff;font-weight:700}
.cn{font-size:12px;color:var(--tx);flex:1}.bg{font-family:var(--m);font-size:9px;padding:2px 7px;border-radius:10px;margin-left:6px;flex-shrink:0}
.b1{background:var(--ad);color:var(--ac)}.b2{background:var(--gd);color:var(--gn)}.b3{background:var(--yd);color:var(--yl)}.b4{background:var(--bd2);color:var(--bl)}
.ci{display:flex;align-items:center;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;gap:14px;margin-bottom:6px}
.ci .nm{font-size:13px;font-weight:600;color:var(--br)}.ci .ds{font-size:11px;color:var(--mu);margin-top:1px}.ci .me{font-family:var(--m);font-size:10px;color:var(--mu);text-align:right;flex-shrink:0}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}.rc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px}.rc h4{font-size:12px;color:var(--br);margin-bottom:3px}.rc p{font-size:11px;color:var(--mu)}.rc a{color:var(--bl);text-decoration:none;font-size:11px}.rc a:hover{text-decoration:underline}
.st{font-size:14px;font-weight:600;color:var(--br);margin:28px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.ax{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.btn{font-family:var(--m);font-size:10px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);color:var(--mu);cursor:pointer;transition:all .12s;white-space:nowrap}.btn:hover{background:var(--s2);color:var(--tx);border-color:var(--mu)}.ba{border-color:var(--ac);color:var(--ac)}.ba:hover{background:var(--ad)}.bg2{border-color:var(--gn);color:var(--gn)}.bg2:hover{background:var(--gd)}
input[type=text],input[type=password],textarea,select{font-family:var(--s);font-size:12px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);padding:7px 10px;width:100%;outline:none;transition:border-color .12s}input:focus,textarea:focus,select:focus{border-color:var(--ac)}textarea{resize:vertical;min-height:60px}
.fg{margin-bottom:12px}.fg label{display:block;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}.mo{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:24px;width:480px;max-width:92vw;max-height:85vh;overflow-y:auto}.mo h3{font-size:16px;color:var(--br);margin-bottom:16px}.moa{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.sp{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.sb{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:32px;width:480px;max-width:100%}.sb h2{font-size:18px;color:var(--br);margin-bottom:6px}.sb .su{font-size:12px;color:var(--mu);margin-bottom:24px;line-height:1.6}
.sb ol{font-size:12px;color:var(--tx);margin:0 0 20px 20px;line-height:1.8}.sb code{font-family:var(--m);font-size:11px;background:var(--s2);padding:1px 5px;border-radius:3px;color:var(--ac)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sf);border:1px solid var(--gn);color:var(--gn);padding:10px 16px;border-radius:var(--r);font-size:12px;z-index:200;animation:fi .2s}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ab{background:var(--ad);border:1px solid rgba(224,82,82,.25);border-radius:var(--r);padding:8px 14px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ac)}
.db{background:none;border:none;color:var(--mu);cursor:pointer;font-size:11px;padding:2px 6px;margin-left:4px;border-radius:3px;transition:all .1s;opacity:0}.cr:hover .db,.phh:hover .db{opacity:1}.db:hover{color:var(--ac);background:var(--ad)}
.qc{text-align:center;padding:40px 20px;margin-bottom:28px}.qm{font-size:48px;line-height:1;color:var(--ac);margin-bottom:12px;opacity:.3}.qt{font-size:28px;font-weight:600;color:var(--br);line-height:1.4;letter-spacing:-.3px;margin-bottom:16px}.qa{font-size:12px;color:var(--mu);letter-spacing:.5px;text-transform:uppercase}
@media(max-width:768px){.side{width:100%;height:auto;position:relative;flex-direction:row;overflow-x:auto;padding:10px 0}.mn{margin-left:0;padding:16px}.logo,.ns,.sft{display:none}.ni{padding:8px 14px;white-space:nowrap;border-left:none;border-bottom:2px solid transparent}.ni.a{border-left:none;border-bottom-color:var(--ac)}.sg{grid-template-columns:1fr 1fr}.rg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="R"></div>
<script>
let sb=null,isA=false,P=[],PH=[],CH=[],PR=new Set,tab='overview',opn=new Set,mcnt=null;
const CERTS=[{id:'cert01',n:'BSCP',f:'Burp Suite Certified Practitioner',mo:'Month 4',co:'~$600'},{id:'cert02',n:'CBBH',f:'HTB Certified Bug Bounty Hunter',mo:'Month 6',co:'~$210'},{id:'cert03',n:'CARTS',f:'Certified AWS Red Team Specialist',mo:'Month 9',co:'~$150'},{id:'cert04',n:'CARTP',f:'Certified Azure Red Team Professional',mo:'Month 11',co:'~$450'},{id:'cert05',n:'OSWE',f:'OffSec Web Expert',mo:'Month 15',co:'~$1,649'},{id:'cert06',n:'OSCP',f:'OffSec Certified Professional',mo:'Month 18',co:'~$1,749'}];
function gc(){try{return JSON.parse(localStorage.getItem('sb_cfg')||'null')}catch{return null}}
function scfg(c){localStorage.setItem('sb_cfg',JSON.stringify(c))}
function iSb(u,k){sb=supabase.createClient(u,k)}
async function ld(){const[a,b,c,d]=await Promise.all([sb.from('platforms').select('*').order('sort_order'),sb.from('phases').select('*').order('sort_order'),sb.from('challenges').select('*').order('sort_order'),sb.from('progress').select('challenge_id')]);if(a.error||b.error||c.error||d.error)throw new Error((a.error||b.error||c.error||d.error).message);P=a.data||[];PH=b.data||[];CH=c.data||[];PR=new Set((d.data||[]).map(r=>r.challenge_id))}
async function tp(id){if(PR.has(id)){PR.delete(id);await sb.from('progress').delete().eq('challenge_id',id)}else{PR.add(id);await sb.from('progress').upsert({challenge_id:id})}rn()}
async function sha(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function chkA(p){const h=await sha(p);const{data}=await sb.from('config').select('value').eq('key','admin_hash').single();if(data&&data.value===h){isA=true;rn();toast('Admin unlocked')}else alert('Wrong passphrase.')}
async function chP(p){const h=await sha(p);await sb.from('config').upsert({key:'admin_hash',value:h});toast('Passphrase updated')}
async function aPlat(id,nm){const mx=P.reduce((m,p)=>Math.max(m,p.sort_order||0),0);const{error}=await sb.from('platforms').insert({id,name:nm,sort_order:mx+1});if(error)throw error;await ld();rn();toast('Platform added')}
async function aPh(id,pid,nm,ds){const rel=PH.filter(p=>p.platform_id===pid);const mx=rel.reduce((m,p)=>Math.max(m,p.sort_order||0),0);const{error}=await sb.from('phases').insert({id,platform_id:pid,name:nm,description:ds,sort_order:mx+1});if(error)throw error;await ld();rn();toast('Phase added')}
async function aCh(id,phid,nm,v){const rel=CH.filter(c=>c.phase_id===phid);const mx=rel.reduce((m,c)=>Math.max(m,c.sort_order||0),0);const{error}=await sb.from('challenges').insert({id,phase_id:phid,name:nm,value:v,sort_order:mx+1});if(error)throw error;await ld();rn();toast('Challenge added')}
async function dCh(id){if(!confirm('Delete this challenge?'))return;await sb.from('progress').delete().eq('challenge_id',id);await sb.from('challenges').delete().eq('id',id);await ld();rn();toast('Deleted')}
async function dPh(id){if(!confirm('Delete phase and all challenges?'))return;const ids=CH.filter(c=>c.phase_id===id).map(c=>c.id);if(ids.length){await sb.from('progress').delete().in('challenge_id',ids);await sb.from('challenges').delete().eq('phase_id',id)}await sb.from('phases').delete().eq('id',id);await ld();rn();toast('Deleted')}
async function dPl(id){if(!confirm('Delete platform, phases, and all challenges?'))return;const pids=PH.filter(p=>p.platform_id===id).map(p=>p.id);const cids=CH.filter(c=>pids.includes(c.phase_id)).map(c=>c.id);if(cids.length)await sb.from('progress').delete().in('challenge_id',cids);if(cids.length)await sb.from('challenges').delete().in('phase_id',pids);if(pids.length)await sb.from('phases').delete().eq('platform_id',id);await sb.from('platforms').delete().eq('id',id);tab='overview';await ld();rn();toast('Deleted')}
function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)}
function sM(h){mcnt=h;rn()}function cM(){mcnt=null;rn()}
function cnt(pid){const pids=PH.filter(p=>p.platform_id===pid).map(p=>p.id);const cs=CH.filter(c=>pids.includes(c.phase_id));return{t:cs.length,d:cs.filter(c=>PR.has(c.id)).length}}
function pct(d,t){return t?Math.round(d/t*100):0}
function badge(v,pid){if(!v)return'';const n=parseInt(v);if(!isNaN(n)&&(pid==='rootme_server'||pid==='rootme_client'))return`<span class="bg b1">${v} pts</span>`;const mp={Apprentice:'b2',Practitioner:'b3',Expert:'b1',Easy:'b2',Medium:'b3',Hard:'b1',Path:'b4',Module:'b4',Lab:'b4',Tool:'b4',Skill:'b4'};return`<span class="bg ${mp[v]||'b4'}">${v}</span>`}
function pbar(d,t,w){const p=pct(d,t);const c=p===100?'var(--gn)':'var(--ac)';return`<div class="pb" style="width:${w||80}px"><div class="pf" style="width:${p}%;background:${c}"></div></div>`}

// Modal helpers
function mPlat(){sM(`<h3>Add Platform</h3><div class="fg"><label>ID (slug)</label><input type="text" id="mi" placeholder="e.g. tryhackme"></div><div class="fg"><label>Name</label><input type="text" id="mn" placeholder="e.g. TryHackMe"></div><div class="moa"><button class="btn" onclick="cM()">Cancel</button><button class="btn bg2" onclick="xPlat()">Add</button></div>`)}
async function xPlat(){const i=document.getElementById('mi').value.trim(),n=document.getElementById('mn').value.trim();if(!i||!n)return alert('Fill all fields');try{await aPlat(i,n);cM()}catch(e){alert(e.message)}}
function mPh(pid){sM(`<h3>Add Phase</h3><div class="fg"><label>ID (slug)</label><input type="text" id="mi" placeholder="e.g. advanced_sqli"></div><div class="fg"><label>Name</label><input type="text" id="mn" placeholder="e.g. Advanced SQLi"></div><div class="fg"><label>Description</label><textarea id="md" placeholder="Optional description"></textarea></div><div class="moa"><button class="btn" onclick="cM()">Cancel</button><button class="btn bg2" onclick="xPh('${pid}')">Add</button></div>`)}
async function xPh(pid){const i=document.getElementById('mi').value.trim(),n=document.getElementById('mn').value.trim(),d=document.getElementById('md').value.trim();if(!i||!n)return alert('Fill ID and name');try{await aPh(i,pid,n,d);cM()}catch(e){alert(e.message)}}
function mCh(phid){sM(`<h3>Add Challenge</h3><div class="fg"><label>ID (unique)</label><input type="text" id="mi" placeholder="e.g. sqli_waf_01"></div><div class="fg"><label>Name</label><input type="text" id="mn" placeholder="e.g. SQL injection - WAF bypass"></div><div class="fg"><label>Value</label><input type="text" id="mv" placeholder="e.g. 50 or Practitioner"></div><div class="moa"><button class="btn" onclick="cM()">Cancel</button><button class="btn bg2" onclick="xCh('${phid}')">Add</button></div>`)}
async function xCh(phid){const i=document.getElementById('mi').value.trim(),n=document.getElementById('mn').value.trim(),v=document.getElementById('mv').value.trim();if(!i||!n)return alert('Fill ID and name');try{await aCh(i,phid,n,v);cM()}catch(e){alert(e.message)}}
function mAdm(){sM(`<h3>Admin Login</h3><div class="fg"><label>Passphrase</label><input type="password" id="mp" placeholder="Enter passphrase" onkeydown="if(event.key==='Enter')xAdm()"></div><div class="moa"><button class="btn" onclick="cM()">Cancel</button><button class="btn bg2" onclick="xAdm()">Unlock</button></div>`)}
async function xAdm(){await chkA(document.getElementById('mp').value);cM()}
function mPass(){sM(`<h3>Change Passphrase</h3><div class="fg"><label>New</label><input type="password" id="mp" placeholder="New passphrase"></div><div class="moa"><button class="btn" onclick="cM()">Cancel</button><button class="btn bg2" onclick="xPass()">Update</button></div>`)}
async function xPass(){const p=document.getElementById('mp').value;if(p.length<4)return alert('Min 4 chars');await chP(p);cM()}

function rPlat(pid){
  const pl=P.find(p=>p.id===pid);if(!pl)return'<div style="padding:40px;color:var(--mu)">Not found</div>';
  const phs=PH.filter(p=>p.platform_id===pid).sort((a,b)=>a.sort_order-b.sort_order);
  const c=cnt(pid);const pc=pct(c.d,c.t);
  let h=`<h2 class="pt">${pl.name}</h2><p class="pd">${c.d} of ${c.t} completed (${pc}%)</p>`;
  if(isA)h+=`<div class="ab"><span>Admin mode</span><div><button class="btn bg2" onclick="mPh('${pid}')" style="margin-right:4px">+ Phase</button><button class="btn ba" onclick="dPl('${pid}')">Delete platform</button></div></div>`;
  h+=`<div class="ax"><button class="btn" onclick="eAll('${pid}')">Expand all</button><button class="btn" onclick="cAll()">Collapse all</button></div>`;
  phs.forEach((ph,i)=>{
    const k=pid+'_'+i,io=opn.has(k);
    const cs=CH.filter(c=>c.phase_id===ph.id).sort((a,b)=>a.sort_order-b.sort_order);
    const d=cs.filter(c=>PR.has(c.id)).length,t=cs.length;
    h+=`<div class="ph ${io?'o':''}"><div class="phh" onclick="tPh('${k}')"><span class="t">${ph.name}</span><div class="mt">${isA?`<button class="db" onclick="event.stopPropagation();dPh('${ph.id}')">delete</button>`:''}<span class="pt2">${d}/${t}</span>${pbar(d,t)}<span class="ar">&#9654;</span></div></div><div class="phb">${ph.description?`<div class="phd">${ph.description}</div>`:''}${cs.map(c=>`<div class="cr ${PR.has(c.id)?'d':''}"><div class="ck ${PR.has(c.id)?'on':''}" onclick="tp('${c.id}')"></div><span class="cn">${c.name}</span>${badge(c.value,pid)}${isA?`<button class="db" onclick="dCh('${c.id}')">×</button>`:''}</div>`).join('')}${isA?`<div class="cr" style="justify-content:center;padding:6px"><button class="btn bg2" onclick="mCh('${ph.id}')">+ Add challenge</button></div>`:''}</div></div>`;
  });
  return h;
}

function rOv(){
  const all={t:CH.length,d:CH.filter(c=>PR.has(c.id)).length};const ap=pct(all.d,all.t);
  let h=`<div class="qc"><div class="qm">"</div><div class="qt">Only way to fail is to stop</div><div class="qa">Offensive Security Roadmap</div></div><div class="sg"><div class="sc"><div class="l">Total</div><div class="v">${ap}%</div><div class="su">${all.d} / ${all.t}</div></div>`;
  P.sort((a,b)=>a.sort_order-b.sort_order).forEach(p=>{const c=cnt(p.id);h+=`<div class="sc"><div class="l">${p.name}</div><div class="v">${c.d}/${c.t}</div><div class="su">${pct(c.d,c.t)}%</div></div>`});
  h+=`</div><h3 class="st">Certification Timeline</h3>`;
  CERTS.forEach((c,i)=>{h+=`<div class="ci"><div class="ck ${PR.has(c.id)?'on':''}" onclick="tp('${c.id}')"></div><div style="font-family:var(--m);font-size:11px;color:var(--mu);width:24px">${String(i+1).padStart(2,'0')}</div><div style="flex:1"><div class="nm">${c.n} — ${c.f}</div></div><div class="me">${c.mo}<br>${c.co}</div></div>`});
  return h;

function rRes(){

function rSetup(){document.getElementById('R').innerHTML=`<div class="sp"><div class="sb"><h2>Connect Database</h2><p class="su">Uses Supabase (free) for cross-device sync. Setup takes 3 minutes.</p><ol><li>Go to <a href="https://supabase.com" target="_blank" style="color:var(--bl)">supabase.com</a> — create a free project</li><li>Open <strong>SQL Editor</strong> — paste and run <code>schema.sql</code></li><li>Go to <strong>Settings &gt; API</strong> — copy URL and anon key</li></ol><div class="fg"><label>Supabase URL</label><input type="text" id="su" placeholder="https://xxxxx.supabase.co"></div><div class="fg"><label>Anon Key</label><input type="text" id="sk" placeholder="eyJhbGciOiJIUzI1NiIs..."></div><div style="display:flex;gap:8px;margin-top:16px"><button class="btn bg2" onclick="doSetup()">Connect</button></div><p style="font-size:10px;color:var(--mu);margin-top:16px">Anon key is safe to expose — designed for client-side. Writes protected by admin passphrase (default: <code>admin</code>).</p></div></div>`}
async function doSetup(){const u=document.getElementById('su').value.trim(),k=document.getElementById('sk').value.trim();if(!u||!k)return alert('Fill both');try{iSb(u,k);const{error}=await sb.from('config').select('key').limit(1);if(error)throw error;scfg({url:u,key:k});await boot()}catch(e){alert('Failed: '+e.message);sb=null}}
async function boot(){const c=gc();if(!c){rSetup();return}iSb(c.url,c.key);document.getElementById('R').innerHTML='<div class="sp"><div class="sb"><h2>Loading...</h2><p class="su">Connecting to database</p></div></div>';try{await ld();if(CH.length===0){document.getElementById('R').innerHTML=`<div class="sp"><div class="sb"><h2>Database Connected</h2><p class="su">Empty database. Seed with ${SD.challenges.length} challenges across ${SD.platforms.length} platforms?</p><div style="display:flex;gap:8px"><button class="btn bg2" onclick="seed()">Seed data</button><button class="btn" onclick="rn()">Start empty</button></div></div></div>`;return}rn()}catch(e){document.getElementById('R').innerHTML=`<div class="sp"><div class="sb"><h2>Connection Error</h2><p class="su">${e.message}</p><button class="btn ba" onclick="disc()">Reset</button></div></div>`}}
